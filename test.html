<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Share</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .share-buttons {
            margin-top: 20px;
        }
        .share-button {
            display: inline-block;
            margin-right: 10px;
            padding: 10px;
            background-color: #0073b1; /* LinkedIn Blue */
            color: white;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
        }
        .share-button.facebook {
            background-color: #4267B2; /* Facebook Blue */
        }
    </style>
</head>
<body>
    <h1>My Blog Article</h1>
    <p>This is a sample blog article.</p>
    
    <div class="share-buttons">
        <a href="#" class="share-button facebook" data-platform="facebook">Share on Facebook</a>
        <a href="#" class="share-button linkedin" data-platform="linkedin">Share on LinkedIn</a>
    </div>
    
    <script>
        $(document).ready(function() {
            var articleUrl = encodeURIComponent(window.location.href);
            var articleTitle = encodeURIComponent(document.title);

            $('.share-button').on('click', function(e) {
                e.preventDefault();

                var platform = $(this).data('platform');
                var shareUrl = '';

                switch(platform) {
                    case 'facebook':
                        shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + articleUrl;
                        break;
                    case 'linkedin':
                        shareUrl = 'https://www.linkedin.com/shareArticle?mini=true&url=' + articleUrl + '&title=' + articleTitle;
                        break;
                }

                if (shareUrl) {
                    window.open(shareUrl, '_blank', 'width=600,height=400');
                }
            });
        });
    </script>
</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dull Background Image with Overlay</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        #background {
            position: relative; /* For positioning the overlay */
            height: 100vh; /* Full height of the viewport */
            background-size: cover; /* Cover the whole container */
            background-position: center; /* Center the background image */
            transition: background-image 1s ease-in-out; /* Smooth transition */
        }
        .bg-image-1 {
            background-image: url('img/intro-carousel/1.jpg');
        }
        .bg-image-2 {
            background-image: url('img/intro-carousel/2.jpg');
        }
        .bg-image-3 {
            background-image: url('img/intro-carousel/3.jpg');
        }
        /* Dull effect using a semi-transparent overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Black overlay with 30% opacity */
            z-index: 1; /* Ensure overlay is above the background image */
        }
        /* To keep the text or other content sharp, add another container */
        .content {
            position: relative;
            z-index: 2; /* Ensure content is above the overlay */
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="background" class="d-flex bg-image-1">
        <div class="overlay"></div>
        <div class="content">
            <h1>Welcome to My Website</h1>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function() {
            var classes = [
                'bg-image-1',
                'bg-image-2',
                'bg-image-3'
            ];

            var currentIndex = 0;
            var changeInterval = 5000; // Interval time in milliseconds (5000ms = 5 seconds)

            function changeBackgroundImage() {
                // Remove current image class
                $('#background').removeClass(classes[currentIndex]);

                // Update index and add new image class
                currentIndex = (currentIndex + 1) % classes.length;
                $('#background').addClass(classes[currentIndex]);
            }

            setInterval(changeBackgroundImage, changeInterval);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text App</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Voice to Text Transcription</h1>
        <div class="mt-3">
            <button id="start-btn" class="btn btn-primary">Start Transcription</button>
            <button id="pause-btn" class="btn btn-warning" disabled>Pause Transcription</button>
            <button id="resume-btn" class="btn btn-info" disabled>Resume Transcription</button>
            <button id="stop-btn" class="btn btn-danger" disabled>Stop Transcription</button>
        </div>
        <div id="transcription-result" class="mt-3">
            <h3>Transcribed Text:</h3>
            <p id="transcribed-text"></p>
        </div>
        <form id="download-form" action="/download" method="POST">
            <input type="hidden" name="text" id="download-text">
            <button id="download-btn" type="submit" class="btn btn-success" disabled>Download Transcription</button>
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
      let eventSource;

$('#start-btn').on('click', function() {
    $.ajax({
        url: '/control',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ action: 'start' }),
        success: function(response) {
            if (response.status === 'started') {
                eventSource = new EventSource('/control-stream');
                eventSource.onmessage = function(event) {
                    $('#transcribed-text').append(event.data + " ");
                };
                $('#start-btn').prop('disabled', true);
                $('#pause-btn').prop('disabled', false);
                $('#stop-btn').prop('disabled', false);
            }
        }
    });
});

$('#pause-btn').on('click', function() {
    $.ajax({
        url: '/control',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ action: 'pause' }),
        success: function(response) {
            if (response.status === 'paused') {
                $('#pause-btn').prop('disabled', true);
                $('#resume-btn').prop('disabled', false);
            }
        }
    });
});

$('#resume-btn').on('click', function() {
    $.ajax({
        url: '/control',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ action: 'resume' }),
        success: function(response) {
            if (response.status === 'resumed') {
                $('#resume-btn').prop('disabled', true);
                $('#pause-btn').prop('disabled', false);
            }
        }
    });
});

$('#stop-btn').on('click', function() {
    $.ajax({
        url: '/control',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ action: 'stop' }),
        success: function(response) {
            if (response.status === 'stopped') {
                eventSource.close();
                $('#download-text').val($('#transcribed-text').text());
                $('#download-btn').prop('disabled', false);
                $('#start-btn').prop('disabled', false);
                $('#pause-btn').prop('disabled', true);
                $('#resume-btn').prop('disabled', true);
                $('#stop-btn').prop('disabled', true);
            }
        }
    });
});

    </script>
</body>
</html>

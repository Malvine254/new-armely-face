<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .checklist li {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .checklist li i {
            color: #3498db;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <ul class="checklist">
        <li><i class="fas fa-check-circle"></i> Scientific Skills For getting a better result</li>
        <li><i class="fas fa-check-circle"></i> Communication Skills to getting in touch</li>
        <li><i class="fas fa-check-circle"></i> A Career Overview opportunity Available</li>
        <li><i class="fas fa-check-circle"></i> A good Work Environment For work</li>
        <li><i class="fas fa-check-circle"></i> Scientific Skills For getting a better result</li>
        <li><i class="fas fa-check-circle"></i> Communication Skills to getting in touch</li>
    </ul>
</body>
</html>
